<table class="table table-striped">
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Subject</th>
            <th>Grades</th>
        </tr>
    </thead>
    <tbody>
        @for (student of students; track student.id) {
            <tr 
                app-student
                [student]="student">
            </tr>
        }
    </tbody>
</table>
